name: Publish
on:
  push:
    branches:
      - "main"

permissions: {}

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    environment: release
    permissions:
      contents: write # to create release (changesets/action)
      pull-requests: write # to create pull request (changesets/action)
      id-token: write #  required for provenance and oidc publish
    if: github.repository == 'tmelliott/rserve-ts'
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      # npm OIDC requires Node 22+ and npm 11.5.1+ (bun doesn't support npm OIDC)
      - name: Setup Node.js & npm for OIDC
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Don't set registry-url - it would set token auth, interfering with OIDC

      - name: Update npm & configure for OIDC
        run: |
          npm install -g npm@latest
          npm config set registry https://registry.npmjs.org
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install Rserve
        run: |
          install.packages("Rserve", repos="http://rforge.net", type="source")
        shell: Rscript {0}

      - name: Start Rserve
        run: |
          cd tests && ./r_files/start_no_ocap &

      - name: Install dependencies
        run: bun install

      - name: Start Rserve
        run: bun run rserve &

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
